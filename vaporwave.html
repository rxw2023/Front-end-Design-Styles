<h1>蒸汽波</h1>
<div class="sub">粉紫青渐变 · 合成波 · 网格太阳</div>
<div class="grid">
<div class="card"><div class="num">01</div><h3>深紫渐变背景</h3><p>从深蓝到深紫的纵向渐变，蒸汽波经典配色——夜空的数字重构。</p></div>

<div class="card"><div class="num">04</div><h3>半透明深紫卡片</h3><p>卡片半透明紫色，背景渐变若隐若现，层层穿透的迷幻感。</p></div>
<div class="card"><div class="num">05</div><h3>80年代合成波</h3><p>蒸汽波是网络艺术运动，将80-90年代流行文化元素与电子音乐美学融合。</p></div>
<div class="card"><div class="num">06</div><h3>复古未来感</h3><p>带讽刺和怀旧情绪——对消费主义未来的幻灭。</p></div>
